global:
  scrape_interval: 10s
  evaluation_interval: 10s

rule_files:
  - /etc/prometheus/alert.rules.yml

scrape_configs:
  - job_name: 'gateway-server'
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['gateway-server:9095']

  - job_name: 'ms-evento-service'
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['ms-evento-service:8096']

  - job_name: 'ms-participants'
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['ms-participants:8097']

  - job_name: 'ms-registro-service'
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['ms-registro-service:8098']

  - job_name: 'ms-auth-service'
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['ms-auth-service:8099']