

networks:
  events-net:
    driver: bridge

services:

  # ── 1. Config Server ──────────────────────────────────────
  config-server:
    build:
      context: ./ms-config-server
      dockerfile: Dockerfile
    container_name: config-server
    ports:
      - "7075:7075"
    volumes:
      - ./config-data:/config-data
    environment:
      SPRING_SECURITY_USER_NAME: root
      SPRING_SECURITY_USER_PASSWORD: "123456"
    networks:
      - events-net
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://root:123456@localhost:7075/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── 2. Registry Server (Eureka) ───────────────────────────
  registry-server:
    build:
      context: ./ms-registry-server
      dockerfile: Dockerfile
    container_name: registry-server
    ports:
      - "8095:8095"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_CONFIG_IMPORT: "optional:configserver:http://root:123456@config-server:7075"
    depends_on:
      config-server:
        condition: service_healthy
    networks:
      - events-net
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8095/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── 3. Gateway ────────────────────────────────────────────
  gateway-server:
    build:
      context: ./ms-gateway-server
      dockerfile: Dockerfile
    container_name: gateway-server
    ports:
      - "9095:9095"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_CONFIG_IMPORT: "optional:configserver:http://root:123456@config-server:7075"
      EUREKA_URI: "http://registry-server:8095/eureka"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: "http://registry-server:8095/eureka"
    depends_on:
      registry-server:
        condition: service_healthy
    networks:
      - events-net

  # ── 4. ms-evento-service ──────────────────────────────────
  ms-evento-service:
    build:
      context: ./ms-evento-service
      dockerfile: Dockerfile
    container_name: ms-evento-service
    ports:
      - "8096:8096"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_CONFIG_IMPORT: "optional:configserver:http://root:123456@config-server:7075"
      EUREKA_URI: "http://registry-server:8095/eureka"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: "http://registry-server:8095/eureka"
      SPRING_APPLICATION_JSON: '{"eureka":{"client":{"serviceUrl":{"defaultZone":"http://registry-server:8095/eureka/"}}}}'
      SPRING_DATASOURCE_URL: "jdbc:mysql://host.docker.internal:3306/ms_evento"
      SPRING_DATASOURCE_USERNAME: "root"
      SPRING_DATASOURCE_PASSWORD: ""
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: "com.mysql.cj.jdbc.Driver"
      SPRING_JPA_HIBERNATE_DDL_AUTO: "update"
      SPRING_JPA_DATABASE_PLATFORM: "org.hibernate.dialect.MySQLDialect"
    depends_on:
      registry-server:
        condition: service_healthy
    networks:
      - events-net
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ── 5. ms-participants ────────────────────────────────────
  ms-participants:
    build:
      context: ./ms-participants
      dockerfile: Dockerfile
    container_name: ms-participants
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_CONFIG_IMPORT: "optional:configserver:http://root:123456@config-server:7075"
      EUREKA_URI: "http://registry-server:8095/eureka"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: "http://registry-server:8095/eureka"
      SPRING_APPLICATION_JSON: '{"eureka":{"client":{"serviceUrl":{"defaultZone":"http://registry-server:8095/eureka/"}}}}'
      SPRING_DATASOURCE_URL: "jdbc:mysql://host.docker.internal:3306/ms_participants"
      SPRING_DATASOURCE_USERNAME: "root"
      SPRING_DATASOURCE_PASSWORD: ""
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: "com.mysql.cj.jdbc.Driver"
      SPRING_JPA_HIBERNATE_DDL_AUTO: "update"
      SPRING_JPA_DATABASE_PLATFORM: "org.hibernate.dialect.MySQLDialect"
    depends_on:
      registry-server:
        condition: service_healthy
    networks:
      - events-net
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ── 6. ms-registro-service ────────────────────────────────
  ms-registro-service:
    build:
      context: ./ms-registro-service
      dockerfile: Dockerfile
    container_name: ms-registro-service
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_CONFIG_IMPORT: "optional:configserver:http://root:123456@config-server:7075"
      EUREKA_URI: "http://registry-server:8095/eureka"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: "http://registry-server:8095/eureka"
      SPRING_DATASOURCE_URL: "jdbc:mysql://host.docker.internal:3306/ms_registro"
      SPRING_DATASOURCE_USERNAME: "root"
      SPRING_DATASOURCE_PASSWORD: ""
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: "com.mysql.cj.jdbc.Driver"
      SPRING_JPA_HIBERNATE_DDL_AUTO: "update"
      SPRING_JPA_DATABASE_PLATFORM: "org.hibernate.dialect.MySQLDialect"
    depends_on:
      registry-server:
        condition: service_healthy
    networks:
      - events-net
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ── 6b. ms-auth-service ───────────────────────────────────
  ms-auth-service:
    build:
      context: ./ms-auth-service
      dockerfile: Dockerfile
    container_name: ms-auth-service
    ports:
      - "8099:8099"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_CONFIG_IMPORT: "optional:configserver:http://root:123456@config-server:7075"
      EUREKA_URI: "http://registry-server:8095/eureka"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: "http://registry-server:8095/eureka"
      SPRING_DATASOURCE_URL: "jdbc:mysql://host.docker.internal:3306/ms_auth"
      SPRING_DATASOURCE_USERNAME: "root"
      SPRING_DATASOURCE_PASSWORD: ""
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: "com.mysql.cj.jdbc.Driver"
      SPRING_JPA_HIBERNATE_DDL_AUTO: "update"
      SPRING_JPA_DATABASE_PLATFORM: "org.hibernate.dialect.MySQLDialect"
    depends_on:
      registry-server:
        condition: service_healthy
    networks:
      - events-net
    extra_hosts:
      - "host.docker.internal:host-gateway"

    # ── Kafka (broker, modo KRaft, sin Zookeeper) ───────────────────
  kafka:
      image: apache/kafka:3.8.0
      container_name: kafka
      ports:
        - "9092:9092"
      environment:
        KAFKA_NODE_ID: 1
        KAFKA_PROCESS_ROLES: broker,controller
        KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
        KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
        KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
        KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
        KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
        KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
        KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
        KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
        KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      networks:
        - events-net

  # ── 7. Observabilidad ─────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./obs/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./obs/prometheus/alert.rules.yml:/etc/prometheus/alert.rules.yml:ro
    networks:
      - events-net

  loki:
    image: grafana/loki:3.1.1
    container_name: loki
    command: -config.file=/etc/loki/loki-config.yml
    ports:
      - "3100:3100"
    volumes:
      - ./obs/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
    networks:
      - events-net

  promtail:
    image: grafana/promtail:3.1.1
    container_name: promtail
    command: -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - ./obs/promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - loki
    networks:
      - events-net

  grafana:
    image: grafana/grafana:11.2.0
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./obs/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
      - loki
    networks:
      - events-net

  # -- 8. ms-pago-service ------------------------------------
  ms-pago-service:
    build:
      context: ./ms-pago-service
      dockerfile: Dockerfile
    container_name: ms-pago-service
    ports:
      - "8097:8097"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_CONFIG_IMPORT: "optional:configserver:http://root:123456@config-server:7075"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: "http://registry-server:8095/eureka"
      SPRING_DATASOURCE_URL: "jdbc:mysql://host.docker.internal:3306/ms_pago"
      SPRING_DATASOURCE_USERNAME: "root"
      SPRING_DATASOURCE_PASSWORD: ""
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: "com.mysql.cj.jdbc.Driver"
      SPRING_JPA_HIBERNATE_DDL_AUTO: "update"
      SPRING_JPA_DATABASE_PLATFORM: "org.hibernate.dialect.MySQLDialect"
    depends_on:
      registry-server:
        condition: service_healthy
    networks:
      - events-net
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # -- 9. ms-asistencia-service ------------------------------
  ms-asistencia-service:
    build:
      context: ./ms-asistencia-service
      dockerfile: Dockerfile
    container_name: ms-asistencia-service
    ports:
      - "8098:8098"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_CONFIG_IMPORT: "optional:configserver:http://root:123456@config-server:7075"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: "http://registry-server:8095/eureka"
      SPRING_DATASOURCE_URL: "jdbc:mysql://host.docker.internal:3306/ms_asistencia"
      SPRING_DATASOURCE_USERNAME: "root"
      SPRING_DATASOURCE_PASSWORD: ""
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: "com.mysql.cj.jdbc.Driver"
      SPRING_JPA_HIBERNATE_DDL_AUTO: "update"
      SPRING_JPA_DATABASE_PLATFORM: "org.hibernate.dialect.MySQLDialect"
    depends_on:
      registry-server:
        condition: service_healthy
    networks:
      - events-net
    extra_hosts:
      - "host.docker.internal:host-gateway"
